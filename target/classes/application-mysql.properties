# MySQL Database Configuration
# Use this profile with: java -jar app.jar --spring.profiles.active=mysql

server.port=8080
server.servlet.context-path=/api

# MySQL Connection (Update these with your MySQL credentials)
spring.datasource.url=jdbc:mysql://localhost:3306/patient_appointment_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Application Configuration
spring.application.name=Patient Appointment Management System
logging.level.root=INFO
logging.level.com.gisma.pams=DEBUG
